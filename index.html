<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassHub LMS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#ec4899',
                        dark: '#111827',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">
    <!-- Top Navigation -->
    <nav id="main-nav" class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer hover:opacity-80 transition" onclick="router.navigate('dashboard')">
                    <div class="bg-primary text-white p-2 rounded-lg mr-3 shadow-md">
                        <i class="fa-solid fa-graduation-cap text-xl"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight text-gray-900">ClassHub</span>
                </div>
                <div class="flex items-center space-x-6">
                    <button onclick="router.navigate('search')" class="text-gray-500 hover:text-primary transition-colors flex flex-col items-center">
                        <i class="fa-solid fa-search text-xl"></i>
                        <span class="text-xs font-medium mt-1">Search</span>
                    </button>
                    <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-primary to-secondary text-white flex items-center justify-center font-bold shadow-md cursor-pointer hover:scale-105 transition transform" id="nav-profile-text" title="Profile">
                        U
                    </div>
                    <button onclick="state.logout(); router.navigate('login');" class="text-gray-400 hover:text-red-500 transition-colors flex flex-col items-center ml-2" title="Logout">
                        <i class="fa-solid fa-right-from-bracket text-xl"></i>
                        <span class="text-xs font-medium mt-1">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 transition-opacity duration-300">
        <!-- Views will be injected here -->
    </main>

    <!-- Modal Container -->
    <div id="modal-container" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <!-- Background overlay -->
            <div id="modal-backdrop" class="fixed inset-0 bg-gray-900 bg-opacity-75 backdrop-blur-sm transition-opacity" aria-hidden="true" onclick="components.closeModal()"></div>
            <!-- Modal panel -->
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div id="modal-content" class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-gray-100">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (Compat version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/components.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/schedule.js"></script>
    <script src="js/views/courseDetail.js"></script>
    <script src="js/views/documentViewer.js"></script>
    <script src="js/views/moduleContent.js"></script>
    <script src="js/views/roster.js"></script>
    <script src="js/views/searchRetrieval.js"></script>
    <script src="js/views/mediaPlayer.js"></script>
    <script src="js/views/login.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
